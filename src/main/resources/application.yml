spring:
  application:
    name: byz-notifications
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/notifications}
    username: ${DB_USER:db}
    password: ${DB_PASS:db}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: notifications
  flyway:
    schemas: notifications
    default-schema: notifications
    create-schemas: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${IAM_JWKS_URL:https://iam.byzantineapp.dev/.well-known/jwks.json}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: notifications
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    listener:
      ack-mode: record
      auto-startup: ${BYZ_KAFKA_ENABLED:true}
    admin:
      fail-fast: false
  mvc:
    async:
      request-timeout: -1

server:
  port: ${PORT:8081}

byz:
  kafka:
    enabled: ${BYZ_KAFKA_ENABLED:true}
    topics:
      iam-user: byz.iam.user

encryption:
  key: ${ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}

observability:
  url: ${OBSERVABILITY_URL:http://localhost:8084}

registration:
  url: ${REGISTRATION_URL:http://localhost:8085}
  instance-id: ${INSTANCE_ID:notifications-1}
  host: ${HOST:localhost}
  heartbeat-interval-ms: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"byz-notifications","logger":"%logger{36}","msg":"%msg"}%n'
